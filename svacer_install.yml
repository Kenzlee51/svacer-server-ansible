---

- name: install svacer
  hosts: "{{ target | default('local')  }}"
  become: true
  vars_files:
    - vars.yml

  roles:
    - role: add_debian_docker_repo
      when: ansible_distribution == "Debian"

    - role: environment_preparation
      tags:
        - always

    - role: svacer_server_launch
      tags:
        - always
    